theme: minima
title: "TBO Retro"
description: "My Retro Collection"
url: "https://tboretro.github.io"

collections:
  home_computers:
    output: true
  ibm_compatibles:
    output: true
  ibm_portables:
    output: true
  consoles:
    output: true
  consoles_mobile:
    output: true  # Do not forget to add new collections to the defaults below!

defaults:
  - scope:
      path: "static"
    values:
      hidden: true
  - scope:
      path: ""      # site-wide
      type: "pages"
    values:
      layout: "home"
