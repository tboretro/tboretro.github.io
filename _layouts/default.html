<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title | default: site.github.repository_name }}{% endif %}</title>
    <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description | default: site.github.project_tagline }}{% endif %}">

    <link rel="stylesheet" href="{{ "/assets/css/style.css?v=" | append: site.github.build_revision | relative_url }}">
  </head>
  <body>
    <header>
      <h1><a href="{{ "/" | relative_url }}">{{ site.title | default: site.github.repository_name }}</a></h1>
      <p>{{ site.description | default: site.github.project_tagline }}</p>

      <!-- ✦ Navigation eingefügt -->
      <nav class="topnav">
        <ul>
          <li><a href="{{ "/" | relative_url }}">Hauptseite</a></li>
          <li><a href="{{ "/links/" | relative_url }}">Meine Links</a></li>
          <li><a href="{{ "/projects/" | relative_url }}">Projekte</a></li>
        </ul>
      </nav>
      <!-- ✦ Ende Navigation -->
    </header>

    <div id="banner">
      <span id="logo"></span>
      <a href="{{ site.github.repository_url }}" class="button fork"><strong>View On GitHub</strong></a>
      {% if site.show_downloads %}
      <div class="downloads">
        <span>Downloads:</span>
        <ul>
          <li><a href="{{ site.github.zip_url }}">ZIP</a></li>
          <li><a href="{{ site.github.tar_url }}">TAR</a></li>
        </ul>
      </div>
      {% endif %}
    </div><!-- end banner -->

    <div class="wrapper">
      <section>
        {{ content }}
      </section>
    </div>
  </body>
</html>
